# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: CI, Publish, and Pre-Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This adds a "Run workflow" button to the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run Tests and Generate Docs
      # This runs your tests and builds the JavaDoc
      run: ./gradlew test javadoc

    - name: Extract Project Version
      # Pulls the version from gradle.properties for tagging
      run: |
        VERSION=$(./gradlew properties | grep ^version: | awk '{print $2}')
        echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build Fat Jar and Publish
      # This publishes to GitHub Packages
      run: ./gradlew publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.PROJECT_VERSION }}
        name: "Release v${{ env.PROJECT_VERSION }}"
        body: |
          ## What's Changed
          Automated build for version ${{ env.PROJECT_VERSION }}.
          
          **Note:** This is a pre-release build.
        draft: false
        prerelease: true
        # This attaches the Fat Jar and JavaDoc Jar to the release page
        files: |
          build/libs/*-all.jar
          build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
