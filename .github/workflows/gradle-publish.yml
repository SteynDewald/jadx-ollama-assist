name: CI, Publish, and Deploy Docs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 
      with:
        fetch-depth: 0

    - name: Make Gradlew Executable
      run: chmod +x gradlew

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build, Test and Docs
      run: ./gradlew test javadoc shadowJar --stacktrace

    # --- DEPLOY JAVADOCS TO GITHUB PAGES ---
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'build/docs/javadoc'

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
    # ---------------------------------------

    - name: Extract Version
      run: |
        VERSION=$(./gradlew properties | grep ^version: | awk '{print $2}')
        echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Publish to GitHub Packages
      run: ./gradlew publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.PROJECT_VERSION }}
        name: "Release v${{ env.PROJECT_VERSION }}"
        body: |
          ## What's Changed
          Automated build for version ${{ env.PROJECT_VERSION }}.
          [View the Live API Documentation here](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)
        prerelease: true
        files: |
          build/libs/*-all.jar
          build/libs/*-javadoc.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
